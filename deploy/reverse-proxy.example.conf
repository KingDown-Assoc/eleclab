# =============================================================================
#  Exemple de reverse proxy Apache (httpd) vers ÉlecLab
#  Le conteneur Docker écoute en local sur 127.0.0.1:1210 (HTTP simple).
#  Apache (ou tout autre reverse proxy) termine le TLS et relaie vers le conteneur.
#
#  Remplacer « eleclab.example.com » par le domaine voulu et adapter les
#  chemins de certificats.
# =============================================================================
#
#  1) Modules requis — décommenter dans la config httpd :
#       LoadModule proxy_module           modules/mod_proxy.so
#       LoadModule proxy_http_module      modules/mod_proxy_http.so
#       LoadModule ssl_module             modules/mod_ssl.so
#       LoadModule rewrite_module         modules/mod_rewrite.so
#       LoadModule headers_module         modules/mod_headers.so
#       LoadModule socache_shmcb_module   modules/mod_socache_shmcb.so
#
#  2) S'assurer qu'Apache écoute en 443 (p. ex. Include conf/extra/httpd-ssl.conf).
#  3) Inclure ce fichier depuis httpd.conf, puis : httpd -t && reload du service.
# =============================================================================

<VirtualHost *:80>
    ServerName eleclab.example.com

    # Laisser passer les challenges ACME (Let's Encrypt), rediriger le reste vers HTTPS
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog  /var/log/httpd/eleclab_http_error.log
    CustomLog /var/log/httpd/eleclab_http_access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName eleclab.example.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/eleclab.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/eleclab.example.com/privkey.pem

    # Le conteneur ne fait que du HTTP en local
    ProxyPreserveHost On
    ProxyPass         / http://127.0.0.1:1210/
    ProxyPassReverse  / http://127.0.0.1:1210/

    # Informe l'app qu'elle est servie en HTTPS
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"

    ErrorLog  /var/log/httpd/eleclab_error.log
    CustomLog /var/log/httpd/eleclab_access.log combined
</VirtualHost>
